<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#003366">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Partes FCC">
  <title>Partes FCC Barbetium</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #003366;
      overflow: hidden;
    }

    /* Pantalla de carga mientras el iframe arranca */
    #splash {
      position: fixed; inset: 0;
      background: #003366;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 10;
      transition: opacity .4s;
    }
    #splash .logo {
      font-size: 26px; font-weight: 900;
      color: #fff; letter-spacing: -.5px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #splash .sub  { font-size: 13px; color: rgba(255,255,255,.55); font-family: sans-serif; }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: sp .7s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* El iframe ocupa toda la pantalla */
    #app {
      width: 100%; height: 100%;
      border: none; display: block;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="spin"></div>
    <div class="logo">FCC Barbetium</div>
    <div class="sub">Cargando partes...</div>
  </div>

  <!--
    ⚠️  IMPORTANTE: sustituye la URL de abajo por la URL de tu
        Google Apps Script desplegada (termina en /exec)
  -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbyTe8uqUbL2-1k2qk4neCqYW7WixqwLP-GsC74hJKcJ45M3CEb7z9qYtqdkv-_evDWi/exec"
    allow="camera; microphone; clipboard-write"
    onload="hideSplash()"
  ></iframe>

  <script>
    // Registrar el Service Worker (necesario para que Chrome ofrezca "Instalar app")
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    }

    // Ocultar pantalla de carga cuando el iframe termina de cargar
    function hideSplash() {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(function(){ s.style.display='none'; }, 400); }
    }

    // Seguro de fallo: ocultar splash a los 12s aunque el iframe tarde
    setTimeout(hideSplash, 12000);
  </script>
</body>
</html>
